<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href="/css/blog.css">
</head>
<body>
    <Header id="header">
        <h1>Blog Posts</h1>
    </Header>
    <div id="entries">
        <ul>
  {% for post in collections.post %}
    <li>
      <a href="{{ post.url }}">{{ post.data.title }}</a>
    </li>
  {% endfor %}
</ul>
   
     </div>
     <footer id="footer">
             <a href="/">Back to Home</a>
        </footer>
    
</body>
</html>
